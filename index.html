<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mastercode — PWA Factory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'deep': {
                            900: '#0b0b0d',
                            800: '#0f0f11',
                            700: '#141418',
                            600: '#16161a',
                            500: '#1a1a1f',
                        },
                        'cyber': {
                            violet: '#8b5cf6',
                            'violet-hover': '#7c3aed',
                            amber: '#f59e0b',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'monospace'],
                    },
                    boxShadow: {
                        'neu-dark': 'inset 0 1px 0 rgba(255,255,255,0.05), 0 2px 10px rgba(0,0,0,0.5)',
                        'neu-pressed': 'inset 0 1px 3px rgba(0,0,0,0.6)',
                        'glow-violet': '0 0 12px rgba(139, 92, 246, 0.25), 0 0 20px rgba(139, 92, 246, 0.08)',
                        'glow-amber': '0 0 10px rgba(245, 158, 11, 0.35), 0 0 18px rgba(245, 158, 11, 0.1)',
                    },
                    fontSize: {
                        '2xs': '0.65rem',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: radial-gradient(ellipse at 50% 0%, #121218 0%, #0b0b0d 70%);
            letter-spacing: -0.01em;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: #0f0f11; border-radius: 2px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
        
        .btn-press {
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
        .btn-press:active {
            transform: scale(0.97);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
        }
        
        @keyframes pulse-amber {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 6px rgba(245, 158, 11, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .animate-pulse-amber {
            animation: pulse-amber 1.2s infinite;
        }
        
        .animate-spin-slow {
            animation: spin 0.8s linear infinite;
        }
        
        .toast-enter {
            top: 12px;
            opacity: 1;
        }
        .toast-exit {
            top: -100px;
            opacity: 0;
        }
        
        input:focus, textarea:focus {
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), 0 0 0 1.5px rgba(139, 92, 246, 0.25), 0 2px 10px rgba(0,0,0,0.5);
        }
        
        /* Optimisation espacements smartphone */
        .card-compact {
            padding: 14px 15px;
        }
        
        .input-compact {
            padding: 10px 12px;
            font-size: 0.8rem;
        }
        
        /* Safe area pour les notch */
        .safe-top {
            padding-top: env(safe-area-inset-top, 8px);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 8px);
        }
    </style>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0d">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="font-sans text-zinc-100 antialiased min-h-screen flex flex-col items-center safe-top">

    <!-- Toast Notification -->
    <div id="toast" class="fixed -top-32 left-1/2 -translate-x-1/2 z-[1000] 
                bg-deep-600/95 backdrop-blur-md border border-emerald-500/30 
                text-emerald-400 font-semibold px-5 py-2.5 rounded-full text-xs
                shadow-[0_4px_16px_rgba(0,0,0,0.7)] transition-all duration-400 ease-out
                flex items-center gap-2 whitespace-nowrap">
        <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span id="toastMsg">✅ Action Réussie</span>
    </div>

    <!-- Conteneur Principal - Optimisé pour smartphone -->
    <div class="w-full max-w-[420px] px-3 safe-bottom pb-4">

        <!-- En-tête Compact -->
        <div class="flex items-center justify-between mb-3 px-1">
            <h1 class="text-lg font-bold tracking-[0.15em] text-white uppercase flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-cyber-violet rounded-full shadow-glow-violet"></span>

            <button onclick="openSwModal()"

        <!-- Carte 1 : Token GitHub - Ultra Compact -->

            <label class="block text-2xs font-semibold uppercase tracking-[0.08em] text-zinc-500 mb-1.5 ml-0.5">

                    <input type="password" id="ghToken" placeholder="ghp_..." oninput="saveKey('ghToken', this.value)"

                <button class="btn-press px-2.5 py-2 bg-deep-500 border border-zinc-800/40 rounded-lg

        <!-- Carte 2 : Projet & Source - Compact -->
        <div class="bg-deep-600/80 backdrop-blur-sm border border-zinc-800/60 rounded-xl card-compact mb-2.5 shadow-neu-dark">
            
            <!-- Nom du Projet -->
            <label class="block text-2xs font-semibold uppercase tracking-[0.08em] text-zinc-500 mb-1.5 ml-0.5">

            </label>
            <input type="text" id="appName" placeholder="mon-app"

                          shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)]

            <!-- Code HTML Source -->
            <label class="block text-2xs font-semibold uppercase tracking-[0.08em] text-zinc-500 mb-1.5 ml-0.5">
                HTML Source
            </label>
            <textarea id="htmlInput" rows="4" placeholder="Colle ton code ici..."

                             shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)] resize-none
                             focus:outline-none focus:border-cyber-violet/50 transition-all duration-200"></textarea>

            <!-- Icône PWA -->
            <label class="block text-2xs font-semibold uppercase tracking-[0.08em] text-zinc-500 mb-1.5 ml-0.5">
                Icône <span class="text-zinc-700 font-normal text-[0.6rem]">(512×512)</span>
            </label>
            <div class="flex items-center gap-3">
                <label class="btn-press flex-1 flex items-center justify-center gap-1.5 py-2.5

                              text-zinc-500 hover:text-zinc-400 hover:border-zinc-600

                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                    </svg>

                <div class="w-10 h-10 rounded-lg border border-zinc-800/60 bg-deep-700 flex items-center justify-center flex-shrink-0 overflow-hidden">
                    <img id="iconPreview" class="w-full h-full object-cover hidden" alt="Icon">
                    <svg id="iconPlaceholder" class="w-4 h-4 text-zinc-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Bouton Principal : Forger - Point focal -->
        <button onclick="generatePWA()" id="mainBtn"
                class="btn-press w-full py-3 bg-cyber-violet hover:bg-cyber-violet-hover 
                       text-white font-bold text-sm uppercase tracking-[0.12em] rounded-xl 
                       shadow-glow-violet hover:shadow-[0_0_18px_rgba(139,92,246,0.4)] 
                       transition-all duration-200 flex items-center justify-center gap-2 mb-2
                       disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none">
            <div class="animate-spin-slow w-4 h-4 border-2 border-white/20 border-t-white rounded-full hidden" id="loader"></div>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            <span>Forger l'Application</span>
        </button>

        <!-- Bouton Secondaire : Injection PWA -->
        <button onclick="injectPwaToGitHub()" id="injectBtn"
                class="btn-press w-full py-2.5 bg-deep-500 border border-zinc-800/60 rounded-xl
                       text-zinc-300 hover:text-white font-semibold text-2xs uppercase tracking-[0.08em]
                       shadow-neu-dark hover:border-cyber-violet/40 transition-all duration-200 mb-2
                       flex items-center justify-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
            </svg>
            <span>Yes, WE Can.</span>
        </button>

        <!-- Bouton Live -->
        <button id="liveBtn" onclick="openLiveSite()"
                class="btn-press w-full py-2.5 bg-transparent border border-cyber-amber/40 rounded-xl
                       text-cyber-amber font-bold text-2xs uppercase tracking-[0.12em]
                       hover:bg-cyber-amber/5 hover:border-cyber-amber/70 transition-all duration-300 mb-2
                       hidden items-center justify-center gap-3">
            <div class="flex gap-1.5">
                <div class="w-2 h-2 rounded-full bg-zinc-700 transition-all duration-300" id="led1"></div>
                <div class="w-2 h-2 rounded-full bg-zinc-700 transition-all duration-300" id="led2"></div>
            </div>
            <span>Voir le Site Live</span>
        </button>

        <!-- Zone de Statut - Compacte -->
        <div id="status" class="hidden bg-deep-700/90 border border-zinc-800/60 rounded-xl p-3 
                    text-zinc-400 font-mono text-[0.6rem] leading-relaxed 
                    shadow-[inset_0_1px_3px_rgba(0,0,0,0.4)] mb-2
                    whitespace-pre-wrap max-h-24 overflow-y-auto"></div>
        
        <button onclick="copyReport()" id="copyBtn"
                class="btn-press w-full py-2 text-2xs text-zinc-600 hover:text-cyber-amber 
                       transition-colors duration-200 font-medium tracking-wide hidden
                       border border-zinc-800/40 rounded-lg">
            📋 Copier le Rapport
        </button>

        <!-- Signature Discrète -->
        <div class="mt-4 text-center">
            <p class="text-[0.6rem] text-zinc-800 tracking-[0.1em] font-medium">
                LD Holding <span class="text-zinc-700">·</span> Paris 2026
            </p>
        </div>
    </div>

    <!-- MODALE SW (Script Personnalisé) - Optimisée mobile -->
    <div id="sw-overlay" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm z-[10000] transition-opacity duration-200"></div>
    <div id="sw-modal" class="hidden fixed inset-x-3 top-4 bottom-4
                bg-deep-600 border border-cyber-amber/30 rounded-2xl p-4 z-[10001] 
                shadow-[0_0_30px_rgba(0,0,0,0.9)] flex flex-col">
        <div class="flex items-center gap-2 mb-3 flex-shrink-0">
            <span class="text-xl">🧠</span>
            <h3 class="text-sm font-bold text-cyber-amber tracking-wide">Script Personnalisé</h3>
        </div>
        <p class="text-[0.6rem] text-zinc-500 mb-3 leading-relaxed flex-shrink-0">
            Injecté avant <code class="text-cyber-violet/70 bg-deep-700 px-1 py-0.5 rounded text-[0.55rem]">&lt;/body&gt;</code>. 
            Surcharge ou ajout de fonctionnalités.
        </p>
        <textarea id="customScript" placeholder="// Collez votre code JS ici..."
                  class="flex-1 w-full bg-deep-700 border border-zinc-700/40 rounded-xl p-3 
                         text-zinc-100 font-mono text-xs leading-relaxed resize-none
                         shadow-[inset_0_1px_3px_rgba(0,0,0,0.5)]
                         focus:outline-none focus:border-cyber-amber/50 transition-all duration-200 min-h-0"></textarea>
        <div class="flex justify-end gap-2 mt-3 flex-shrink-0">
            <button onclick="resetCustomScript()" 
                    class="btn-press px-3 py-2 bg-transparent border border-red-500/20 rounded-lg 
                           text-red-400 font-semibold text-2xs hover:bg-red-500/10 transition-all duration-200">
                🗑️
            </button>
            <button onclick="saveCustomScript()" 
                    class="btn-press px-4 py-2 bg-cyber-violet rounded-lg text-white font-semibold text-2xs
                           shadow-glow-violet hover:bg-cyber-violet-hover transition-all duration-200">
                💾 Sauver
            </button>
            <button onclick="closeSwModal()" 
                    class="btn-press px-4 py-2 bg-deep-500 border border-zinc-700/40 rounded-lg 
                           text-zinc-400 font-semibold text-2xs hover:text-white transition-all duration-200">
                Fermer
            </button>
        </div>
    </div>

    <!-- Canvas caché pour le traitement d'icônes -->
    <canvas id="canvas" class="hidden"></canvas>

    <script>
        // =============================================
        // LOGIQUE MÉTIER — STRICTEMENT PRÉSERVÉE
        // =============================================

        // ---------- GESTION DU SCRIPT PERSONNALISÉ (SW) ----------
        const CUSTOM_SCRIPT_KEY = 'mastercode_custom_script';

        function loadCustomScriptFromStorage() {
            const saved = localStorage.getItem(CUSTOM_SCRIPT_KEY);
            if (saved) {
                document.getElementById('customScript').value = saved;
            }
        }

        function saveCustomScript() {
            const script = document.getElementById('customScript').value;
            localStorage.setItem(CUSTOM_SCRIPT_KEY, script);
            showToast("✅ Script sauvegardé !");
            closeSwModal();
        }

        function resetCustomScript() {
            if (confirm("Supprimer définitivement votre script personnalisé ?")) {
                localStorage.removeItem(CUSTOM_SCRIPT_KEY);
                document.getElementById('customScript').value = '';
                showToast("Script réinitialisé.");
                closeSwModal();
            }
        }

        function openSwModal() {
            loadCustomScriptFromStorage();
            document.getElementById('sw-modal').style.display = 'flex';
            document.getElementById('sw-overlay').style.display = 'block';
        }

        function closeSwModal() {
            document.getElementById('sw-modal').style.display = 'none';
            document.getElementById('sw-overlay').style.display = 'none';
        }

        // ---------- FONCTION D'INJECTION PWA SUR GITHUB ----------
        async function injectPwaToGitHub() {
            const ghToken = document.getElementById('ghToken').value;
            const appName = document.getElementById('appName').value.trim().replace(/\s+/g, '-');
            const sourceHtml = document.getElementById('htmlInput').value.trim();

            if (!ghToken) {
                showToast("❌ Token GitHub manquant", true);
                return;
            }
            if (!appName) {
                showToast("❌ Nom du projet manquant", true);
                return;
            }
            if (!sourceHtml) {
                showToast("❌ Code HTML source vide", true);
                return;
            }

            let owner = "";
            try {
                const userRes = await fetch('https://api.github.com/user', {
                    headers: { 'Authorization': `token ${ghToken}` }
                });
                if (!userRes.ok) throw new Error("Token invalide");
                const userData = await userRes.json();
                owner = userData.login;
            } catch (err) {
                showToast("❌ Impossible de vérifier le token", true);
                return;
            }

            const repo = appName;
            const path = 'index.html';
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            const headers = {
                'Authorization': `token ${ghToken}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            };

            const liveBtn = document.getElementById('liveBtn');
            const led1 = document.getElementById('led1');
            const led2 = document.getElementById('led2');
            liveOwner = owner;
            liveRepo = repo;
            liveBtn.style.display = 'flex';
            led1.className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
            led2.className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
            let checkInterval = null;

            try {
                updateStatus("🔍 Récupération des infos du fichier distant...", false);
                const getResp = await fetch(url, { headers });
                let sha = null;
                if (getResp.status === 200) {
                    const fileData = await getResp.json();
                    sha = fileData.sha;
                } else if (getResp.status !== 404) {
                    throw new Error(`Impossible d'accéder au fichier (${getResp.status})`);
                }

                const headElements = `
<link rel="manifest" href="./manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4b6cb7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">
`;

                const swScript = `
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker enregistré !'))
        .catch(err => console.error('Erreur SW :', err));
    });
  }
<\/script>
`;

                const parser = new DOMParser();
                const doc = parser.parseFromString(sourceHtml, 'text/html');

                if (doc.head) {
                    doc.head.insertAdjacentHTML('beforeend', headElements);
                } else {
                    doc.documentElement.insertAdjacentHTML('afterbegin', '<head>' + headElements + '</head>');
                }

                if (doc.body) {
                    doc.body.insertAdjacentHTML('beforeend', swScript);
                } else {
                    doc.documentElement.insertAdjacentHTML('beforeend', '<body>' + swScript + '</body>');
                }

                let updatedHtml = doc.documentElement.outerHTML;
                if (!sourceHtml.toLowerCase().includes('<!doctype html>')) {
                    updatedHtml = '<!DOCTYPE html>\n' + updatedHtml;
                }

                const encodedContent = btoa(unescape(encodeURIComponent(updatedHtml)));

                updateStatus("📤 Injection des balises PWA et envoi à GitHub...", false);
                const putBody = {
                    message: "feat(pwa): injection auto des balises manifest + service worker via Mastercode",
                    content: encodedContent
                };
                if (sha) putBody.sha = sha;

                const putResp = await fetch(url, {
                    method: 'PUT',
                    headers: headers,
                    body: JSON.stringify(putBody)
                });

                if (!putResp.ok) {
                    const errData = await putResp.json();
                    throw new Error(errData.message || "Échec de l'upload");
                }

                updateStatus("✅ index.html mis à jour avec succès sur GitHub !", false);
                showToast("✅ Injection PWA terminée !");

                const siteUrl = `https://${owner.toLowerCase()}.github.io/${repo}/`;
                updateStatus(`🌐 Attente du déploiement sur ${siteUrl}...`, false);
                
                let attempts = 0;
                const maxAttempts = 40;
                checkInterval = setInterval(async () => {
                    attempts++;
                    try {
                        const testResp = await fetch(siteUrl, { method: 'HEAD', mode: 'no-cors' });
                        clearInterval(checkInterval);
                        led1.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                        led2.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                        updateStatus("✅ Site prêt et accessible !", false);
                        showToast("🌍 Site disponible !");
                    } catch (err) {
                        if (attempts >= maxAttempts) {
                            clearInterval(checkInterval);
                            led1.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                            led2.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                            updateStatus("⚠️ Délai d'attente dépassé.", false);
                        }
                    }
                }, 3000);

            } catch (err) {
                console.error(err);
                updateStatus(`❌ Erreur : ${err.message}`, false);
                showToast(`❌ Échec : ${err.message}`, true);
                led1.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                led2.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                if (checkInterval) clearInterval(checkInterval);
            }
        }

        // ---------- RESTE DE L'APPLICATION (INCHANGÉ) ----------
        const saveKey = (id, val) => localStorage.setItem(id, val);
        document.getElementById('ghToken').value = localStorage.getItem('ghToken') || '';

        let liveOwner = "";
        let liveRepo = "";
        let deploymentInterval = null;

        function toggleView(id) {
            const el = document.getElementById(id);
            const btn = event.target;
            if (el.type === "password") { 
                el.type = "text"; 
                btn.innerText = "🙈"; 
            } else { 
                el.type = "password"; 
                btn.innerText = "👁"; 
            }
        }

        async function pasteToken() {
            try {
                const text = await navigator.clipboard.readText();
                const el = document.getElementById('ghToken');
                el.value = text;
                saveKey('ghToken', text);
                showToast("📋 Token collé !");
            } catch (err) {
                showToast("⚠️ Accès au presse-papiers refusé", true);
            }
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            const tMsg = document.getElementById('toastMsg');
            tMsg.innerText = msg;
            
            if (isError) {
                t.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                t.style.color = '#f87171';
            } else {
                t.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                t.style.color = '#34d399';
            }
            
            t.classList.add('toast-enter');
            t.classList.remove('toast-exit');
            
            setTimeout(() => { 
                t.classList.add('toast-exit');
                t.classList.remove('toast-enter');
            }, 3000);
        }

        function clearAllData() {
            if(confirm("Supprimer les clés ?")) { localStorage.clear(); location.reload(); }
        }

        let base64Icon = "";
        function previewIcon(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.getElementById('canvas');
                        const ctx = canvas.getContext('2d');
                        
                        canvas.width = 512; 
                        canvas.height = 512;
                        
                        let sourceX = 0, sourceY = 0, sourceWidth = img.width, sourceHeight = img.height;
                        if (img.width > img.height) {
                            sourceWidth = img.height;
                            sourceX = (img.width - img.height) / 2;
                        } else if (img.height > img.width) {
                            sourceHeight = img.width;
                            sourceY = (img.height - img.width) / 2;
                        }
                        
                        ctx.clearRect(0, 0, 512, 512);
                        ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, 512, 512);
                        
                        const dataUrl = canvas.toDataURL('image/png');
                        base64Icon = dataUrl.split(',')[1];
                        
                        const preview = document.getElementById('iconPreview');
                        const placeholder = document.getElementById('iconPlaceholder');
                        preview.src = dataUrl;
                        preview.style.display = 'block';
                        if (placeholder) placeholder.style.display = 'none';
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateStatus(msg, clear = false) {
            const s = document.getElementById('status');
            s.style.display = 'block';
            document.getElementById('copyBtn').style.display = 'flex';
            if (clear) s.innerHTML = msg; else s.innerHTML += `\n> ${msg}`;
        }

        function copyReport() {
            navigator.clipboard.writeText(document.getElementById('status').innerText);
            showToast("Rapport copié !");
        }

        async function checkDeploymentStatus() {
            const ghToken = document.getElementById('ghToken').value;
            if (!liveOwner || !liveRepo || !ghToken) return;

            try {
                const res = await fetch(`https://api.github.com/repos/${liveOwner}/${liveRepo}/actions/runs?per_page=1`, {
                    headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github+json' }
                });
                if (!res.ok) return;
                
                const data = await res.json();
                if (data.workflow_runs && data.workflow_runs.length > 0) {
                    const run = data.workflow_runs[0];
                    const l1 = document.getElementById('led1');
                    const l2 = document.getElementById('led2');
                    
                    l1.className = 'w-2 h-2 rounded-full bg-zinc-700';
                    l2.className = 'w-2 h-2 rounded-full bg-zinc-700';

                    if (run.status === 'in_progress' || run.status === 'queued') {
                        l1.className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
                        l2.className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
                    } else if (run.status === 'completed') {
                        if (run.conclusion === 'success') {
                            l1.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                            l2.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.4)]';
                        } else {
                            l1.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                            l2.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                        }
                    }
                }
            } catch (err) {
                console.error("Erreur statut Live :", err);
            }
        }

        function openLiveSite() {
            if (liveOwner && liveRepo) {
                const cleanOwner = liveOwner.toLowerCase();
                window.open(`https://${cleanOwner}.github.io/${liveRepo}/`, '_blank');
            }
        }

        async function generatePWA() {
            const ghToken = document.getElementById('ghToken').value;
            const appName = document.getElementById('appName').value.trim().replace(/\s+/g, '-');
            let htmlInputContent = document.getElementById('htmlInput').value.trim();
            const btn = document.getElementById('mainBtn');
            const loader = document.getElementById('loader');

            if (!ghToken || !appName || !htmlInputContent || !base64Icon) return showToast("⚠️ Données manquantes", true);

            btn.disabled = true; loader.style.display = 'block';
            document.getElementById('liveBtn').style.display = 'none';
            if (deploymentInterval) clearInterval(deploymentInterval);
            
            updateStatus("--- SEQUENCE MASTERCODE 2.9 ACTIVÉE ---", true);

            try {
                const userRes = await fetch('https://api.github.com/user', { headers: { 'Authorization': `token ${ghToken}` } });
                if (!userRes.ok) throw new Error("Accès GitHub refusé");
                const userData = await userRes.json();
                const owner = userData.login;

                const repoCheck = await fetch(`https://api.github.com/repos/${owner}/${appName}`, { headers: { 'Authorization': `token ${ghToken}` } });
                if (repoCheck.status === 404) {
                    updateStatus("Création du dépôt...");
                    await fetch('https://api.github.com/user/repos', {
                        method: 'POST',
                        headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: appName, auto_init: true })
                    });
                }

                updateStatus("Injection du moteur PWA...");
                
                const tagS = '<' + 'script' + '>';
                const tagE = '<' + '/' + 'script' + '>';
                const headE = '<' + '/' + 'head' + '>';
                const bodyE = '<' + '/' + 'body' + '>';
                
                const swReg = `\n${tagS}if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}${tagE}\n`;
                const pwaTags = `\n<link rel="manifest" href="manifest.json">\n<meta name="theme-color" content="#4b6cb7">\n<link rel="apple-touch-icon" href="icon.png">`;

                let finalHtml = htmlInputContent;
                if (finalHtml.toLowerCase().includes(headE)) {
                    finalHtml = finalHtml.replace(new RegExp(headE, 'i'), `${pwaTags}${headE}`);
                } else {
                    finalHtml = `<head>${pwaTags}</head>` + finalHtml;
                }
                
                const customScriptRaw = localStorage.getItem(CUSTOM_SCRIPT_KEY);
                let customScriptBlock = '';
                if (customScriptRaw && customScriptRaw.trim() !== '') {
                    customScriptBlock = `\n<!-- Custom script injected by Mastercode -->\n${tagS}\n${customScriptRaw}\n${tagE}\n`;
                    updateStatus("Script personnalisé détecté, injection en cours...");
                }
                
                if (finalHtml.toLowerCase().includes(bodyE)) {
                    finalHtml = finalHtml.replace(new RegExp(bodyE, 'i'), `${customScriptBlock}${swReg}${bodyE}`);
                } else {
                    finalHtml += `${customScriptBlock}${swReg}`;
                }

                const manifest = JSON.stringify({
                    "name": appName, 
                    "short_name": appName, 
                    "start_url": "./index.html",
                    "display": "standalone", 
                    "background_color": "#1a1c20", 
                    "theme_color": "#4b6cb7",
                    "icons": [{
                        "src": "icon.png", 
                        "sizes": "512x512", 
                        "type": "image/png",
                        "purpose": "any maskable"
                    }]
                }, null, 2);

                const sw = `const cacheName='${appName}-v1'; self.addEventListener('install',e=>{e.waitUntil(caches.open(cacheName).then(c=>c.addAll(['./index.html','./manifest.json','./icon.png'])));}); self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;

                const utf8b64 = (s) => btoa(unescape(encodeURIComponent(s)));

                const files = [
                    { path: 'index.html', content: utf8b64(finalHtml) },
                    { path: 'manifest.json', content: utf8b64(manifest) },
                    { path: 'sw.js', content: utf8b64(sw) },
                    { path: 'icon.png', content: base64Icon }
                ];

                for (const file of files) {
                    updateStatus(`Upload : ${file.path}...`);
                    let sha = null;
                    const getF = await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, { headers: { 'Authorization': `token ${ghToken}` } });
                    if(getF.status === 200) sha = (await getF.json()).sha;

                    await fetch(`https://api.github.com/repos/${owner}/${appName}/contents/${file.path}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${ghToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: 'Mastercode Sync', content: file.content, sha: sha })
                    });
                }

                updateStatus("Activation GitHub Pages...");
                await new Promise(r => setTimeout(r, 3000));
                await fetch(`https://api.github.com/repos/${owner}/${appName}/pages`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${ghToken}`, 'Accept': 'application/vnd.github+json' },
                    body: JSON.stringify({ source: { branch: 'main', path: '/' } })
                });

                updateStatus("Opération terminée avec succès.");
                showToast("✅ Mastercode : Forgé !");
                
                liveOwner = owner;
                liveRepo = appName;
                
                document.getElementById('led1').className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
                document.getElementById('led2').className = 'w-2 h-2 rounded-full bg-cyber-amber shadow-glow-amber animate-pulse-amber';
                document.getElementById('liveBtn').style.display = 'flex';
                
                checkDeploymentStatus();
                deploymentInterval = setInterval(checkDeploymentStatus, 4000);

            } catch (err) {
                updateStatus("❌ ERREUR : " + err.message);
                showToast("Échec de la forge", true);
            } finally {
                btn.disabled = false; loader.style.display = 'none';
            }
        }
    </script>

            .catch(err => console.error('Erreur SW :', err));
        });
